<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BlackEcho Control Center</title>
    <style>
      body { margin: 0; font-family: Inter, Arial, sans-serif; background: radial-gradient(circle at top, #1c305f, #080d1f); color: #eef3ff; }
      .shell { min-height: 100vh; padding: 24px; display: grid; gap: 16px; }
      .panel { background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(18px); border-radius: 16px; padding: 18px; }
      .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
      h1 { margin: 0; font-size: 1.5rem; }
      .muted { opacity: 0.8; font-size: 0.9rem; }
      .fade-in-down { animation: fadeInDown 0.5s ease-out; }
      .fade-in-up { animation: fadeInUp 0.6s ease-out; }
      .card-label { display: flex; gap: 8px; align-items: center; }
      @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="panel fade-in-down">
        <h1>BlackEcho War Room</h1>
        <p class="muted">Local-first tactical control center</p>
      </section>
      <section class="cards">
        <article class="panel fade-in-up"><span class="card-label"><span aria-hidden="true">📻</span> Media Injection</span></article>
        <article class="panel fade-in-up"><span class="card-label"><span aria-hidden="true">🛡️</span> Telemetry Killswitch</span></article>
        <article class="panel fade-in-up"><span class="card-label"><span aria-hidden="true">🔌</span> Plugin Catalog</span></article>
      </section>
    </div>
  </body>
</html>
